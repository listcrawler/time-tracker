name: Build and Publish

on:
  release:
    types: [prereleased, released]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build/publish (e.g. v1.2.3)
        required: true

jobs:
  setup:
    name: Resolve release info
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.info.outputs.ref }}
      publish: ${{ steps.info.outputs.publish }}
    steps:
      - name: Get release info
        id: info
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            PRERELEASE=$(gh api repos/${{ github.repository }}/releases/tags/$TAG --jq '.prerelease')
            echo "ref=$TAG" >> $GITHUB_OUTPUT
          else
            TAG="${{ github.event.release.tag_name }}"
            PRERELEASE=${{ github.event.release.prerelease }}
            echo "ref=${{ github.ref }}" >> $GITHUB_OUTPUT
          fi
          if [ "$PRERELEASE" = "false" ]; then
            echo "publish=true" >> $GITHUB_OUTPUT
          else
            echo "publish=false" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build distribution
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build package
        run: uv build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: [setup, build]
    if: needs.setup.outputs.publish == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/listcrawler-time-tracker
    permissions:
      id-token: write  # required for Trusted Publishing
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
